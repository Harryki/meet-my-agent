services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/db.sqlite3
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_LOCAL_BASE_PATH=/app/data/storage/files
      - GOOGLE_REDIRECT_URI=http://localhost:3000/auth/callback
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
      - sqlite_data:/app/data
      - ./backend/storage/files:/app/data/storage/files
    depends_on:
      redis:
        condition: service_healthy
    command: ["api-dev"]

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/db.sqlite3
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_LOCAL_BASE_PATH=/app/data/storage/files
      - GOOGLE_REDIRECT_URI=http://localhost:3000/auth/callback
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
      - ./backend/worker:/app/worker
      - sqlite_data:/app/data
      - ./backend/storage/files:/app/data/storage/files
    depends_on:
      redis:
        condition: service_healthy
    command: ["worker"]

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://app:8000
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend/pages:/app/pages
      - ./frontend/components:/app/components
      - ./frontend/context:/app/context
      - ./frontend/lib:/app/lib
      - ./frontend/styles:/app/styles
      - ./frontend/next.config.js:/app/next.config.js
      - ./frontend/package.json:/app/package.json
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/public:/app/public
    depends_on:
      - app

volumes:
  redis_data:
  sqlite_data:
